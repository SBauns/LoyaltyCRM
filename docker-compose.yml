services:
  reverse-proxy:
    image: nginx:alpine
    volumes:
      - /etc/nginx:/etc/nginx
    #   - ./certs/yourcert.pfx:/etc/ssl/private/yourcert.pfx:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - papascrm-web
      - papascrm-api
    networks:
      - papanet
  papascrm-web:
    build:
      context: ../papacrm-web
      dockerfile: Dockerfile
    # ports:
    #   - "445:445"
    #   - "82:80"
    environment:
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/yourcert.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
    # volumes:
    #   - ./certs/yourcert.pfx:/https/yourcert.pfx:ro
    networks:
      - papanet

  papascrm-api:
    build:
      context: .
      dockerfile: Dockerfile
    # volumes:
    #   # Only mount the cert if using HTTPS in production
    #   - ./certs/TODOCERT.pfx:/https/TODOCERT.pfx:ro
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=${CERT_PATH}
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - ASPNETCORE_URLS=http://+:80
    # ports:
    #   - "${EXPOSED_HTTPS_PORT:-444}:444"
    #   - "${EXPOSED_HTTP_PORT:-81}:80"
    depends_on:
      - sqlserver
    networks:
      - papanet

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-CTP2.1-ubuntu-22.04
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    networks:
      - papanet
    volumes:
      - sqlvolume:/var/opt/mssql

volumes:
  sqlvolume:

networks: 
  papanet:
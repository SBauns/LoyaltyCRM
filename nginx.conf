server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Blazor framework files - selective caching
    location ~* ^/_framework/.*\.js$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location /_framework/ {
        try_files $uri =404;
        etag off;
        add_header Last-Modified "";
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # Static assets with long-term caching (only files NOT in _framework)
    location ~* ^(?!/_framework/).*\.(js|png|jpg|jpeg|gif|ico|svg|wasm|webmanifest)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # CSS files - no cache to force reload
    location ~* ^(?!/_framework/).*\.css$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # JSON files (excluding _framework)  
    location ~* ^(?!/_framework/).*\.json$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Blazor WASM routing - serve static files and fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # API proxy
    location /api/ {
        proxy_pass http://papascrm-api:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
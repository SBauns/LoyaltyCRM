<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>papacrm-web</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="papa-logo.webp" />
    <link href="LoyaltyCrm.WebApp.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        // Load authHelpers with cache-busting during development (localhost)
        (function(){
            try {
                if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                    var s = document.createElement('script');
                    s.src = 'authHelpers.js?v=' + Date.now();
                    s.defer = true;
                    document.head.appendChild(s);
                }
                else {
                    var s2 = document.createElement('script');
                    s2.src = 'authHelpers.js';
                    s2.defer = true;
                    document.head.appendChild(s2);
                }
            } catch (e) { console.error(e); }
        })();
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Register service worker only when not running on localhost
        // This prevents cached assets from hiding live changes during development.
        if ('serviceWorker' in navigator) {
            if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                navigator.serviceWorker.register('service-worker.js');
            }
        }
    </script>
</body>

<script>
    window.BlazorCulture = {
        get: function () {
            return localStorage['BlazorCulture'];
        },
        set: function (value) {
            localStorage['BlazorCulture'] = value;
        }
    };
</script>

</html>

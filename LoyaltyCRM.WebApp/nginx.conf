server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Blazor framework files - allow caching to fix navbar loading
    location /_framework/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Static assets with long-term caching (only files NOT in _framework)
    location ~* ^(?!/_framework/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|wasm|webmanifest)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # JSON files (excluding _framework)
    location ~* ^(?!/_framework/).*\.json$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Blazor WASM routing - serve static files and fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache index.html
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}